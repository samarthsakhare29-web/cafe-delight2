    <style>
        .gallery-header {
            background-color: var(--color-bg);
            padding: calc(var(--nav-height) + 4rem) 0 3rem;
            text-align: center;
        }

        .gallery-header h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .gallery-header p {
            color: var(--color-text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        /* Masonry Grid */
        .masonry-grid {
            column-count: 3;
            column-gap: 1.5rem;
            padding: 2rem 0 6rem;
        }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 1.5rem;
            border-radius: var(--radius-md);
            overflow: hidden;
            position: relative;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
        }

        .masonry-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform var(--transition-slow);
        }

        .masonry-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .masonry-overlay i {
            color: white;
            font-size: 2rem;
            transform: scale(0.5);
            transition: transform var(--transition-fast);
        }

        .masonry-item:hover img {
            transform: scale(1.05);
        }

        .masonry-item:hover .masonry-overlay {
            opacity: 1;
        }

        .masonry-item:hover .masonry-overlay i {
            transform: scale(1);
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-fast);
        }

        .lightbox.active {
            opacity: 1;
            pointer-events: all;
        }

        .lightbox-content {
            position: relative;
            max-width: 90%;
            max-height: 90vh;
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 90vh;
            border-radius: var(--radius-sm);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .lightbox-close {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            transition: color var(--transition-fast);
        }

        .lightbox-close:hover {
            color: var(--color-primary);
        }

        @media (max-width: 992px) {
            .masonry-grid {
                column-count: 2;
            }
        }

        @media (max-width: 576px) {
            .masonry-grid {
                column-count: 1;
            }
        }
    </style>
</head>

    <!-- Scripts -->

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const items = document.querySelectorAll('.masonry-item');
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const lightboxClose = document.getElementById('lightbox-close');

            items.forEach(item => {
                item.addEventListener('click', () => {
                    const imgSrc = item.querySelector('img').src;
                    // Force higher quality image for lightbox by replacing query params if we want
                    const highResSrc = imgSrc.replace('w=600', 'w=1200').replace('w=800', 'w=1200');
                    lightboxImg.src = highResSrc;
                    lightbox.classList.add('active');
                    document.body.style.overflow = 'hidden'; // prevent scrolling behind
                });
            });

            lightboxClose.addEventListener('click', () => {
                lightbox.classList.remove('active');
                document.body.style.overflow = '';
            });

            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) {
                    lightbox.classList.remove('active');
                    document.body.style.overflow = '';
                }
            });

            // Re-use update cart function from main logic just for the bubble status
            const cart = JSON.parse(localStorage.getItem('delight_cart')) || [];
            const counts = document.querySelectorAll('.cart-count');
            const total = cart.reduce((sum, item) => sum + item.quantity, 0);
            counts.forEach(c => c.innerText = total);
        });
    </script>
