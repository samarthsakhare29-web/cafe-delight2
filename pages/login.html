<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Delight Cafe</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/toast.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/layout.css">

    <style>
        .auth-container {
            max-width: 400px;
            margin: 4rem auto;
            padding: 2.5rem;
            background: var(--color-bg);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .auth-title {
            margin-bottom: 0.5rem;
            color: var(--color-text);
        }

        .auth-subtitle {
            color: var(--color-text-muted);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--color-border);
            border-radius: 6px;
            background: var(--color-bg-alt);
            color: var(--color-text);
            transition: border-color 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        .auth-btn {
            width: 100%;
            padding: 0.8rem;
            margin-top: 1rem;
        }

        .auth-footer {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--color-text-muted);
        }

        .auth-footer a {
            color: var(--color-primary);
            font-weight: 600;
        }
    </style>
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar glass">
        <div class="container">
            <a href="../index.html" class="logo">
                <i class="fa-solid fa-mug-hot"></i> Delight Cafe
            </a>

            <ul class="nav-links">
                <li><a href="../index.html" class="nav-link">Home</a></li>
                <li><a href="menu.html" class="nav-link">Menu</a></li>
                <li><a href="order.html" class="nav-link">Order Online</a></li>
                <li><a href="reservation.html" class="nav-link">Reservation</a></li>
            </ul>

            <div class="nav-actions">
                <button id="theme-toggle" class="icon-btn" aria-label="Toggle Dark Mode">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <div class="container fade-in-up">
            <div class="auth-container">
                <h2 class="auth-title">Welcome Back</h2>
                <p class="auth-subtitle">Log in to manage your orders and reservations.</p>

                <form id="login-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" class="form-control" required placeholder="name@example.com">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="form-control" required placeholder="••••••••">
                    </div>

                    <button type="submit" class="btn btn-primary auth-btn" id="login-btn">
                        <span>Log In</span>
                        <i class="fa-solid fa-spinner fa-spin" style="display: none; margin-left: 8px;"></i>
                    </button>
                </form>

                <div class="auth-footer">
                    Don't have an account? <a href="register.html">Sign up</a>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="border-top: none; text-align: center; margin-top: 0;">
                <p>&copy; 2026 Delight Cafe. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="../js/api.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/auth.js"></script>
</body>

</html>
